services:
  postgres:
    image: postgres:17-alpine
    container_name: fabdoyoumeme-${STAGE:-dev}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fabdoyoumeme
      POSTGRES_USER: fabdoyoumeme
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fabdoyoumeme']
      interval: 5s
      retries: 5
    expose:
      - 5432
    networks:
      - project_network
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  backend:
    container_name: fabdoyoumeme-${STAGE:-dev}-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/api/health || exit 1']
      interval: 5s
      retries: 10
      start_period: 10s
    environment:
      DATABASE_URL: postgres://fabdoyoumeme:${POSTGRES_PASSWORD}@postgres:5432/fabdoyoumeme
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-fabdoyoumeme-assets}
      ALLOWED_ORIGIN: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      MAGIC_LINK_BASE_URL: ${FRONTEND_URL}
      MAGIC_LINK_TTL: ${MAGIC_LINK_TTL:-15m}
      SESSION_TTL: ${SESSION_TTL:-720h}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      PORT: ${BACKEND_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Stage marker gating /api/admin/danger/* route registration in
      # cmd/server/main.go. Fails safe to "prod" — a missing value keeps
      # the danger zone unmounted. Legal values: dev, preprod, prod.
      APP_ENV: ${APP_ENV:-prod}
      RECONNECT_GRACE_WINDOW: ${RECONNECT_GRACE_WINDOW:-30s}
      WS_RATE_LIMIT: ${WS_RATE_LIMIT:-20}
      WS_READ_LIMIT_BYTES: ${WS_READ_LIMIT_BYTES:-4096}
      WS_READ_DEADLINE: ${WS_READ_DEADLINE:-60s}
      WS_PING_INTERVAL: ${WS_PING_INTERVAL:-25s}
      SESSION_RENEW_INTERVAL: ${SESSION_RENEW_INTERVAL:-60m}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-2097152}
      RATE_LIMIT_AUTH_RPM: ${RATE_LIMIT_AUTH_RPM:-10}
      RATE_LIMIT_INVITE_VALIDATION_RPH: ${RATE_LIMIT_INVITE_VALIDATION_RPH:-20}
      RATE_LIMIT_ROOMS_RPH: ${RATE_LIMIT_ROOMS_RPH:-10}
      RATE_LIMIT_UPLOADS_RPH: ${RATE_LIMIT_UPLOADS_RPH:-50}
      RATE_LIMIT_GLOBAL_RPM: ${RATE_LIMIT_GLOBAL_RPM:-100}
    expose:
      - 8080
    networks:
      - project_network
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  frontend:
    container_name: fabdoyoumeme-${STAGE:-dev}-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      ORIGIN: ${FRONTEND_URL}
      # SvelteKit SSR loads and the /api/* proxy in hooks.server.ts reach
      # the backend via this internal URL. Browser code uses relative
      # `/api/*` paths — the custom server.js forwards HTTP and tunnels
      # WebSocket upgrades to API_URL, so the backend port never needs
      # to be published to the host.
      API_URL: http://backend:8080
      # Frontend-visible stage marker mirroring the backend's APP_ENV.
      # Gates rendering of the admin sidebar "Danger zone" nav link and
      # the /admin/danger page load function. Fails safe to "prod" — a
      # missing value hides the UI entirely. Must match APP_ENV above.
      PUBLIC_APP_ENV: ${PUBLIC_APP_ENV:-prod}
      # Legal / privacy policy (served at /privacy). Injected at runtime via
      # `$env/dynamic/public` so operators can update disclosure content
      # without rebuilding the image. See docs/self-hosting.md for details.
      PUBLIC_OPERATOR_NAME: ${PUBLIC_OPERATOR_NAME}
      PUBLIC_OPERATOR_CONTACT_EMAIL: ${PUBLIC_OPERATOR_CONTACT_EMAIL}
      PUBLIC_OPERATOR_URL: ${PUBLIC_OPERATOR_URL:-${FRONTEND_URL}}
      PUBLIC_OPERATOR_SMTP_PROVIDER: ${PUBLIC_OPERATOR_SMTP_PROVIDER}
      # adapter-node defaults to a 512 KiB request body cap. Without an
      # override every image >512 KiB silently 413s at the SvelteKit proxy
      # before the request reaches the backend, and the studio toast just
      # says "Import failed" with no detail. Sized for the bulk image
      # endpoint (MaxBulkUploadFiles=25 × MAX_UPLOAD_SIZE_BYTES=10 MiB +
      # multipart slack), with operator override via env.
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-268435456}
    expose:
      - 3000
    networks:
      - project_network
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

volumes:
  postgres_data:

networks:
  project_network:
    driver: bridge
