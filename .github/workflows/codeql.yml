# .github/workflows/codeql.yml
#
# CodeQL static analysis. Two languages are in scope:
#   - go         — the backend package tree
#   - javascript — covers SvelteKit + TypeScript (CodeQL treats TS as JS)
#
# Runs on every push and PR to main, plus a weekly scheduled sweep so
# rule-set improvements flag issues in code that hasn't changed. The
# schedule cron is Monday 06:00 UTC to line up with Dependabot's weekly
# run — one weekly "security Monday" instead of scattered noise.
name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - go
          - javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` includes security rules plus quality
          # rules (dead code, unused imports) that tend to catch real
          # issues in a moderately sized repo without much noise.
          queries: security-and-quality

      # Go needs a real build for the extractor to see all call sites.
      # Autobuild handles the standard `go build ./...` case.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
