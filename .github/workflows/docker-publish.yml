# .github/workflows/docker-publish.yml
#
# Publishes backend and frontend images to GHCR.
#
# Triggers:
#   push to main           → :unstable      (rolling dev build)
#   release published      → :X.Y.Z, :X.Y, :X, :stable   (SemVer moving tags)
#
# Note: intentionally NOT triggered by pull_request. A PR from a fork running
# with push permissions would be a supply-chain disaster. Tests and image
# smoke builds for PRs live in backend.yml / frontend.yml (push-only, no-push
# smoke test). The roadmap calls this out explicitly.
#
# Tag semantics (no :latest — see roadmap):
#   :unstable   rolling build from main, may break
#   :X.Y.Z      exact version, frozen forever
#   :X.Y        latest patch of minor line
#   :X          latest minor of major line
#   :stable     latest released version across all lines
#
# Self-hoster guidance: pin :stable for production, :X.Y for conservative
# auto-upgrade within a minor line, an exact :X.Y.Z if you need full freeze.
#
# Build topology:
#   build (matrix: {backend, frontend} × {amd64, arm64})
#     → each per-arch build runs on its native runner (no QEMU), pushes by
#       digest only, exports the digest as an artifact.
#   merge (matrix: {backend, frontend})
#     → assembles a multi-arch manifest list under every metadata tag, then
#       runs Trivy + provenance attestation against the merged index once.
#
# This replaces the previous single-runner QEMU build. Native arm64 (free
# ubuntu-24.04-arm runner for public repos) typically cuts the frontend
# wall-clock by ~3–5× because the SvelteKit/npm build no longer emulates.
name: Docker publish

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker-publish.yml'
  release:
    types: [published]

# Cancel in-flight :unstable rebuilds when a newer commit lands on main, but
# never cancel a release publish — those are one-shot and must complete.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

# Least-privilege token. contents:read for checkout, packages:write for GHCR
# push, id-token + attestations for SLSA provenance attestations,
# security-events:write so the Trivy SARIF upload can post to the Security tab
# (codeql-action/upload-sarif calls the code-scanning API, which is scoped to
# this permission — without it the upload warns "Resource not accessible by
# integration" and silently drops the findings).
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  # Per-arch build. Each cell runs on its native runner (no QEMU), pushes the
  # image by digest only (no tag), and uploads the digest for the merge job.
  build:
    name: Build ${{ matrix.name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        name: [backend, frontend]
        arch: [amd64, arm64]
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # GHCR requires lowercase image paths. github.repository_owner preserves
      # case (e.g. "MorganKryze"), so downcase it explicitly — otherwise the
      # push fails with "invalid reference format". Matrix value is passed via
      # env to keep ${{ }} out of the shell script body (injection hygiene).
      - name: Compute image reference
        id: image
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ref=ghcr.io/${owner}/fabdoyoumeme-${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only — tags are applied later by the merge job to the manifest
      # list. metadata-action still gives us the canonical OCI labels here.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.ref }}
          labels: |
            org.opencontainers.image.title=FabDoYouMeme ${{ matrix.name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

      # Push by digest only (`outputs: ...,push-by-digest=true,name-canonical=true`).
      # No tag is applied at this stage; the merge job assembles the manifest
      # list and attaches all tags atomically.
      #
      # Cache scope is per-(image, arch) so amd64 and arm64 don't evict each
      # other and the GHA cache stays warm across runs.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch }}

      # Stash the digest as a one-line file so the merge job can pick all
      # arches up via a single download-artifact glob. Filename is the bare
      # hex (sha256: prefix stripped) so the merge job can rebuild full refs.
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.name }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble per-arch digests into a manifest list, apply every tag from
  # metadata-action atomically, then run Trivy + provenance once against the
  # merged index.
  merge:
    name: Merge & publish ${{ matrix.name }}
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [backend, frontend]
    steps:
      - name: Compute image reference
        id: image
        env:
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ref=ghcr.io/${owner}/fabdoyoumeme-${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag plan — one call to metadata-action emits every tag we want.
      # `enable` clauses scope each pattern to the correct trigger.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=unstable,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}
            type=raw,value=stable,enable=${{ github.event_name == 'release' }}

      # Build the manifest list pointing at every per-arch digest, applying
      # every tag in one atomic call. `jq` produces the `-t TAG` flags;
      # source refs are reconstructed from the digest filenames uploaded by
      # the build job.
      - name: Create and push manifest list
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          mapfile -t tag_args < <(jq -r '.tags[] | "-t\n" + .' <<< "$TAGS_JSON")
          mapfile -t source_refs < <(printf '%s\n' * | sed "s|^|${IMAGE_REF}@sha256:|")
          docker buildx imagetools create "${tag_args[@]}" "${source_refs[@]}"

      # Re-resolve the merged manifest's digest so attestation + Trivy target
      # the manifest list (not any one arch).
      - name: Inspect merged digest
        id: digest
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          first_tag="$(jq -r '.tags[0]' <<< "$TAGS_JSON")"
          digest="$(docker buildx imagetools inspect "${first_tag}" --format '{{json .Manifest}}' | jq -r '.digest')"
          echo "value=${digest}" >> "$GITHUB_OUTPUT"

      # SLSA build provenance signed by GitHub's Sigstore identity. Verifiable
      # with `gh attestation verify <image>` — gives self-hosters cryptographic
      # proof the image came from this exact workflow run on this repo.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.ref }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true

      # Trivy: non-blocking OS/package vuln scan. Reports CRITICAL/HIGH to the
      # Security tab but exits 0 — we don't block releases on a new upstream
      # CVE landing in Debian/Alpine. govulncheck (backend) and npm audit
      # (frontend) already run as blocking gates in the per-language CI.
      #
      # Pinned to an exact version (not @master) so a compromise of the Trivy
      # Action repo can't silently land in our builds. aquasecurity/trivy-action
      # doesn't publish a floating major tag like actions/checkout@v6, so exact
      # version pin is the closest equivalent. Dependabot tracks this line
      # weekly (see .github/dependabot.yml — github-actions ecosystem).
      # `continue-on-error: true` honors the non-blocking intent: a Trivy DB
      # download flake, multi-arch index quirk, or transient GHCR pull error
      # must not fail the publish job. `exit-code: '0'` only governs Trivy's
      # behavior on finding vulnerabilities — it does not cover Trivy itself
      # erroring before it writes the SARIF file.
      - name: Trivy vulnerability scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}@${{ steps.digest.outputs.value }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      # `hashFiles` returns '' when the path doesn't exist, so this skips
      # cleanly if the Trivy step errored before producing a SARIF. Without
      # this guard, `if: always()` tried to upload a missing file and failed
      # the job with "Path does not exist: trivy-<name>.sarif".
      - name: Upload Trivy results
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.name)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      # Matrix and step outputs are passed via env to keep ${{ }} out of the
      # shell body — defends against future edits introducing an injection
      # path even though current values are all trusted.
      - name: Summary
        env:
          IMAGE_NAME: ${{ matrix.name }}
          IMAGE_DIGEST: ${{ steps.digest.outputs.value }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          {
            echo "### Published ${IMAGE_NAME}"
            echo ""
            echo "**Digest:** \`${IMAGE_DIGEST}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            printf '%s\n' "${IMAGE_TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
