# .github/workflows/backend.yml
name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fabyoumeme_test
          POSTGRES_USER: fabyoumeme
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://fabyoumeme:testpassword@localhost:5432/fabyoumeme_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        working-directory: backend
        run: go mod download

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Vet
        working-directory: backend
        run: go vet ./...

      # ADR-011 lint — the session cookie's SameSite attribute must stay
      # Strict. This is the project's only CSRF defense, and relaxing it
      # (even to Lax) is a silent opening of every authenticated endpoint.
      # Any new PR that introduces a SameSite value other than
      # http.SameSiteStrictMode in tokens.go fails CI here. If a future
      # decision ever intentionally relaxes this, supersede ADR-011 first.
      - name: Lint SameSite=Strict on session cookie (ADR-011)
        working-directory: backend
        run: |
          set -euo pipefail
          file=internal/auth/tokens.go
          if [ ! -f "$file" ]; then
            echo "::error::$file missing — ADR-011 lint cannot run"
            exit 1
          fi
          total=$(grep -c 'SameSite:' "$file" || true)
          strict=$(grep -c 'SameSite: http\.SameSiteStrictMode' "$file" || true)
          if [ "$total" = "0" ]; then
            echo "::error::$file sets no SameSite on the session cookie — ADR-011 requires http.SameSiteStrictMode"
            exit 1
          fi
          if [ "$total" != "$strict" ]; then
            echo "::error::ADR-011 violation — every SameSite on the session cookie in $file must be http.SameSiteStrictMode"
            echo "SameSite lines found:"
            grep -n 'SameSite:' "$file" || true
            exit 1
          fi
          echo "ADR-011 lint OK — $strict/$total SameSite lines are Strict in $file"

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run migrations
        working-directory: backend
        run: migrate -path ./db/migrations -database "$DATABASE_URL" up

      - name: Test
        working-directory: backend
        run: go test -race -count=1 ./...

      - name: Vulnerability check
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Docker build smoke test
        run: docker build -t fabyoumeme-backend:ci ./backend
