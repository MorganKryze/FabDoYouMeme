# .github/workflows/backend.yml
#
# Backend CI — split into parallel jobs so a failure in one (e.g. lint)
# does not block the others from reporting. The Postgres service container
# that previous revisions started was unused: the test suite runs its own
# Postgres via testcontainers-go, and the only other consumer was a
# `migrate up` smoke run whose signal was weak. Dropping it saves ~20s
# per run and removes a source of confusion about which DB tests hit.
name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        working-directory: backend
        run: go mod download

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Vet
        working-directory: backend
        run: go vet ./...

      # ADR-011 lint — the session cookie's SameSite attribute must stay
      # Strict. This is the project's only CSRF defense, and relaxing it
      # (even to Lax) is a silent opening of every authenticated endpoint.
      # Any new PR that introduces a SameSite value other than
      # http.SameSiteStrictMode in tokens.go fails CI here. If a future
      # decision ever intentionally relaxes this, supersede ADR-011 first.
      - name: Lint SameSite=Strict on session cookie (ADR-011)
        working-directory: backend
        run: |
          set -euo pipefail
          file=internal/auth/tokens.go
          if [ ! -f "$file" ]; then
            echo "::error::$file missing — ADR-011 lint cannot run"
            exit 1
          fi
          total=$(grep -c 'SameSite:' "$file" || true)
          strict=$(grep -c 'SameSite: http\.SameSiteStrictMode' "$file" || true)
          if [ "$total" = "0" ]; then
            echo "::error::$file sets no SameSite on the session cookie — ADR-011 requires http.SameSiteStrictMode"
            exit 1
          fi
          if [ "$total" != "$strict" ]; then
            echo "::error::ADR-011 violation — every SameSite on the session cookie in $file must be http.SameSiteStrictMode"
            echo "SameSite lines found:"
            grep -n 'SameSite:' "$file" || true
            exit 1
          fi
          echo "ADR-011 lint OK — $strict/$total SameSite lines are Strict in $file"

  sqlc-verify:
    name: sqlc diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.27.0'

      # `sqlc diff` exits non-zero if the generated Go in db/sqlc is stale
      # relative to the queries in db/queries. This is our defense against
      # Stage 1's finding 1.4 (no sqlc gate) and 1.3 (possible mtime drift).
      - name: sqlc diff
        working-directory: backend
        run: sqlc diff

  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        working-directory: backend
        run: go mod download

      # The test run is the project's primary gate. It exercises:
      #   - every unit test (fast, in-process)
      #   - every integration test (testcontainers-go spins up Postgres)
      #   - every E2E test currently lives under the same `go test ./...`
      #     invocation (no `//go:build e2e` tag is in use today)
      #   - any goleak.VerifyTestMain hook added per Stage 6 §6.11
      # ubuntu-latest ships Docker, which testcontainers needs.
      - name: Test with coverage
        working-directory: backend
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: error
          retention-days: 14

  security:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      # govulncheck exits 3 on any reachable vulnerability. We filter its
      # JSON output through the .govulncheck-ignore allowlist so the build
      # fails only on new vulns. Known-accepted IDs must carry a rationale
      # comment in the ignore file — see finding 5.F in
      # docs/review/2026-04-10/05-security.md. No untrusted GitHub event
      # inputs are used in this step.
      - name: Vulnerability check
        working-directory: backend
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          ignore=$(grep -vE '^[[:space:]]*(#|$)' .govulncheck-ignore | sort -u || true)
          echo "Ignoring vuln IDs:"
          printf '%s\n' "$ignore" | sed 's/^/  - /'
          report=$(govulncheck -format json ./... || true)
          found=$(printf '%s' "$report" | jq -r 'select(.finding? != null) | .finding.osv // empty' | sort -u || true)
          if [ -z "$found" ]; then
            echo "govulncheck: no reachable vulnerabilities"
            exit 0
          fi
          echo "govulncheck reachable IDs:"
          printf '%s\n' "$found" | sed 's/^/  - /'
          new=$(comm -23 <(printf '%s\n' "$found") <(printf '%s\n' "$ignore"))
          if [ -n "$new" ]; then
            echo "::error::govulncheck found un-ignored vulnerabilities:"
            printf '%s\n' "$new"
            exit 1
          fi
          echo "govulncheck: all reachable vulns are listed in .govulncheck-ignore"

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t fabyoumeme-backend:ci ./backend
