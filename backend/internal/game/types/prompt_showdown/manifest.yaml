# Prompt Choice — handler manifest.
#
# Players see a sentence with a blank and play a filler card from a dealt
# hand. The hub deals/refills the hand from the filler pack each round.
# This file is the single source of truth for identity and bounds.

slug: prompt-showdown
name: Prompt Choice
description: Pick the funniest filler from your hand to complete the sentence. Others vote for the best.
version: "1.0.0"
supports_solo: false

required_packs:
  - role: prompt
    payload_versions: [4]
  - role: filler
    payload_versions: [3]

config:
  # Per-round submit phase.
  min_round_duration_seconds: 15
  max_round_duration_seconds: 300
  default_round_duration_seconds: 45

  # Per-round voting phase.
  min_voting_duration_seconds: 10
  max_voting_duration_seconds: 120
  default_voting_duration_seconds: 30

  # Rounds in a single game.
  min_round_count: 1
  max_round_count: 30
  default_round_count: 5

  # Simultaneous players in a room. Matches meme-showdown so hosts see a
  # consistent ceiling across showdown-style games. Pack-size validation is
  # per-room (rooms.config.max_players → ValidatePackRequirements), so a
  # bundled-pack room just picks a smaller cap; rooms that want the full
  # 12-player worst case must bring a filler pack large enough for it.
  min_players: 2
  max_players: 12

  # Filler hand dealt to each player at game start; refilled each round.
  min_hand_size: 3
  max_hand_size: 7
  default_hand_size: 4
