# Prompt Freestyle — handler manifest.
#
# Players see a sentence with a blank and type their own filler. The hub
# scores votes the same way as meme-freestyle (one point per vote received).
# This file is the single source of truth for identity and bounds.

slug: prompt-freestyle
name: Prompt Freestyle
description: Fill the blank in a sentence with your own twist. Others vote for the funniest.
version: "1.0.0"
supports_solo: false

required_packs:
  - role: prompt
    payload_versions: [4]

config:
  # Per-round submit phase.
  min_round_duration_seconds: 15
  max_round_duration_seconds: 300
  default_round_duration_seconds: 45

  # Per-round voting phase.
  min_voting_duration_seconds: 10
  max_voting_duration_seconds: 120
  default_voting_duration_seconds: 30

  # Rounds in a single game.
  min_round_count: 1
  max_round_count: 30
  default_round_count: 8

  # Simultaneous players in a room.
  min_players: 2
  max_players: 12
