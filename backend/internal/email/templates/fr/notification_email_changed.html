<!-- backend/internal/email/templates/notification_email_changed.html -->
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Adresse e-mail modifiée — FabDoYouMeme</title>
  </head>
  <body
    style="font-family:sans-serif;max-width:560px;margin:0 auto;padding:24px"
  >
    <h2>Bonjour {{.Username}},</h2>
    <p>
      L’adresse e-mail de votre compte FabDoYouMeme a été modifiée vers
      <strong>{{.NewEmailMasked}}</strong>.
    </p>
    <p>
      Si vous êtes à l’origine de ce changement, aucune action n’est requise.
    </p>
    <p style="color:#dc2626">
      Si vous n’êtes <strong>PAS</strong> à l’origine de ce changement,
      contactez immédiatement votre administrateur.
    </p>
    <hr style="border:none;border-top:1px solid #e4e4e7;margin:24px 0" />
    <p style="color:#71717a;font-size:12px">
      <a href="{{.FrontendURL}}" style="color:#71717a">FabDoYouMeme</a>
    </p>
  </body>
</html>
